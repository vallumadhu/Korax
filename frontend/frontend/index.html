<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CoLearn</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/welcome_page.css">
</head>

<body>
  <div class="nav">
    <div class="logo"></div>
    <div class="nav-right">
      <a href="../../employer_login/emp_login.html" class="employer-btn">Employer Login</a>
    </div>
  </div>

  <div class="hero">

    <div class="earn-side">
      <div class="earn-text">Earn</div>
      <div class="earn-sub"></div>
    </div>

    <!-- LEFT -->
    <div class="side left-side">
      <div class="big-text teach">
        Teach
      </div>
      <div class="sub-text">
        Earn credits by sharing your knowledge.
      </div>
    </div>

    <!-- RIGHT -->
    <div class="side right-side">
      <div class="big-text learn">
        Learn
      </div>
      <div class="sub-text">
        Use credits to learn new skills.
      </div>
    </div>

    <!-- ICONS CONTAINER -->
    <div class="icons-container">
      <img class="icon main-icon" id="main-teacher" src="assets/teacher.png" alt="Teacher">
      <img class="icon student-left" id="left-student-1" src="assets/student.png" alt="Student">
      <img class="icon student-left" id="left-student-2" src="assets/student.png" alt="Student">
      <img class="icon student-left" id="left-student-3" src="assets/student.png" alt="Student">
      <img class="icon student-left" id="left-student-4" src="assets/student.png" alt="Student">
      <img class="icon student-left" id="left-student-5" src="assets/student.png" alt="Student">

      <img class="icon main-icon" id="main-student" src="assets/student.png" alt="Student">
      <img class="icon teacher-right" id="right-teacher-1" src="assets/teacher.png" alt="Teacher">
      <img class="icon teacher-right" id="right-teacher-2" src="assets/teacher.png" alt="Teacher">
      <img class="icon teacher-right" id="right-teacher-3" src="assets/teacher.png" alt="Teacher">
      <img class="icon teacher-right" id="right-teacher-4" src="assets/teacher.png" alt="Teacher">
      <img class="icon teacher-right" id="right-teacher-5" src="assets/teacher.png" alt="Teacher">

      <!-- CREDIT PARTICLES POOL -->
      <div id="credits-container"></div>
    </div>

    <div class="cta-row">
      <button class="cta-btn cta-register">Register</button>
      <button class="cta-btn cta-signin">Sign In</button>
    </div>

  </div>



  <script src="js/welcome_page.js"></script>
</body>

</html>
