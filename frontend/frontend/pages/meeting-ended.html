<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Meeting Ended</title>
  <link rel="stylesheet" href="../css/meeting-ended.css">
</head>
<body>

  <div class="ended-page">
    <div class="ended-card">

      <h1>Your meeting has ended</h1>
      <p class="subtitle">
        Thanks for joining. You can rejoin or start a new meeting anytime.
      </p>

      <!-- Optional room info -->
      <div id="roomInfo" class="room-info"></div>

      <div class="actions">
        <button id="rejoinBtn" class="btn primary">Rejoin</button>
        <button id="newBtn" class="btn secondary">Join New Meeting</button>
      </div>

    </div>
  </div>

  <script src="../js/meeting-ended.js"></script>
</body>
</html>
