<!doctype html>
<html lang="en">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>Sign In - Korax</title>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="../css/sign_in.css">
</head>

<body>
	<main class="auth-page">
		<section class="auth-card">
			<p class="eyebrow">Welcome Back</p>
			<h1>Sign In</h1>
			<p class="subtitle">Continue your Teach and Learn journey.</p>

			<form id="loginForm" class="auth-form" novalidate>
				<label for="email">Email</label>
				<input id="email" name="email" type="email" placeholder="you@example.com" required>

				<label for="password">Password</label>
				<div class="password-wrap">
					<input id="password" name="password" type="password" placeholder="Enter your password" required
						minlength="6">
					<button id="togglePwd" type="button"><svg width="22" height="22" viewBox="0 0 24 24"
							stroke="currentColor" fill="none">
							<path d="M1 12s4-6 11-6 11 6 11 6-4 6-11 6-11-6-11-6z" />
							<circle cx="12" cy="12" r="3" />
						</svg></button>
				</div>

				<button id="submitBtn" type="submit" class="cta-btn">Sign In</button>
				<p id="error" class="error" aria-live="polite"></p>
			</form>

			<p class="switch-link">No account? <a href="register.html">Register!</a></p>
		</section>
	</main>

	<script src="../js/sign_in.js" defer></script>
	<script src="../frontend_api/sign_in.js" type="module" defer></script>
</body>

</html>
